name: combat_sample
description: A sample Flutter Scene app demonstrating combat mechanics.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ">=3.16.0"

dependencies:
  data_assets: ^0.20.0
  flutter:
    sdk: flutter
  flutter_scene: ^0.19.0
  flutter_scene_rapier: ^0.2.2
  # hook/build.dart compiles the .fmat materials into a shader bundle.
  hooks: ^2.0.0
  scene_dash_v2:
    path: ../../packages/scene_dash_v2
  vector_math: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # Characters, animation rigs, and `.fmat` materials are compiled
    # DataAssets. Weapons remain multi-file runtime glTFs.
    - assets/character_assets/
