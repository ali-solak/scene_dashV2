name: combat_sample
description: >-
  Combat Slice, the Scene-Dash v2 melee sample: a knight locks onto barbarians
  in a sunlit forest clearing. Requires the Flutter master channel + Flutter
  GPU (`flutter run --enable-flutter-gpu`); the authored `.fmat` materials
  additionally need `flutter config --enable-dart-data-assets`.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_scene: ^0.19.0
  flutter_scene_rapier: ^0.2.2
  # hook/build.dart compiles the .fmat materials into a shader bundle.
  hooks: ^2.0.0
  scene_dash_v2:
    path: ../../packages/scene_dash_v2
  vector_math: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # KayKit Adventurers: characters carry no clips; every animation lives in
    # the shared Rig_Medium_* files and is retargeted by node name at runtime
    # (see docs/asset_inventory.md at the repo root).
    - assets/characters/
    - assets/animation/
    - assets/materials/
    - assets/character_assets/
